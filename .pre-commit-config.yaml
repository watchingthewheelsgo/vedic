repos:
  - repo: local
    hooks:
      - id: whitespace-check
        name: Check staged whitespace
        entry: git diff --cached --check
        language: system
        pass_filenames: false

      - id: python-format-check
        name: Python format check
        entry: npm run backend:format:check
        language: system
        pass_filenames: false

      - id: python-lint
        name: Python lint
        entry: npm run backend:lint
        language: system
        pass_filenames: false

      - id: typescript-check
        name: TypeScript check
        entry: npm run check
        language: system
        pass_filenames: false

      - id: backend-tests
        name: Backend tests
        entry: npm run backend:test
        language: system
        pass_filenames: false
